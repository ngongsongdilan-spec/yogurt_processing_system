services:
  - type: web
    name: yogurt-processing-system
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn yogurt_project.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: yogurt_project.settings
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,.railway.app,localhost"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://*.railway.app"
      - key: DATABASE_URL
        fromDatabase:
          name: yogurt-db
          property: connectionString

databases:
  - name: yogurt-db
    plan: free
    databaseName: yogurt
